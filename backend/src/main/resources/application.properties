spring.application.name=demo
server.port=8080
#jwt.secret256bit=a-string-secret-at-least-256-bits-long

# ===============================
# = DATA SOURCE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://database:5432/social_media}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:social_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=250MB

logging.level.root=debug
server.error.include-message=always

# ===============================
# = HTTPS
# ===============================
server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true

jwt.secret=a-string-secret-at-least-256-bits-long-to-be-secure

# ===============================
# = OAUTH2
# ===============================
oauth.42.client-id=${OAUTH_42_CLIENT_ID:}
oauth.42.client-secret=${OAUTH_42_CLIENT_SECRET:}
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
# Public-facing base URL (nginx host) used for callback URLs and post-auth redirect
oauth.base-url=${OAUTH_BASE_URL:https://localhost}
