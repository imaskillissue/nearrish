services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - backend_network
    depends_on:
      - backend
  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    secrets:
      - db_password
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      db_network:
            aliases:
                - database
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    build: ./frontend
    ports:
      - "80:3000"
    networks:
      - backend_network
    depends_on:
      - backend
  backend:
    build: ./backend/
    environment:
      - SPRING_CONFIG_IMPORT=optional:configtree:/run/secrets/
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - MODERATION_ENABLED=${MODERATION_ENABLED:-true}
    secrets:
      - source: db_password
        target: spring.datasource.password
    volumes:
      - upload-data:/app/uploads
    ports:
      - "8080:8080"
    networks:
      db_network:
      backend_network:
        aliases:
          - backend
    depends_on:
      database:
        condition: service_healthy

  geo-service:
    build:
      context: ./geo-service
      platforms:
        - linux/amd64
        - linux/arm64
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    ports:
      - 5002:5002
    networks:
      db_network:
        aliases:
          - geo-service
      backend_network:
        aliases:
          - geo-service
    depends_on:
      database:
        condition: service_healthy

  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - 11434:11434
    networks:
      backend_network:
        aliases:
          - ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    profiles: [ollama]
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen2.5:3b"]
    networks:
      - backend_network
    restart: "no"

  moderation-service:
    build:
      context: ./moderation-service
    ports:
      - 8001:8001
    networks:
      backend_network:
        aliases:
          - moderation-service

volumes:
  db-data:
  ollama-data:
  upload-data:

networks:
  db_network:
      driver: bridge
  backend_network:
      driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password.txt
